<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Reading Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #FFD54F;
    }

    /* NAV BAR */
    nav {
      background-color: #FFD54F;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-weight: bold;
      font-size: 18px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      text-decoration: none;
      color: black;
      font-size: 14px;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 80px 20px;
      position: relative;
    }

    .light-band {
      background-color: #FFECB3;
      height: 70px;
      width: 100%;
      position: absolute;
      top: 40px;
      left: 0;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero p {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 900;
      margin-bottom: 40px;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .buttons a {
      background-color: black;
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .buttons a:hover {
      background-color: #222;
    }
  </style>
</head>

<body>
